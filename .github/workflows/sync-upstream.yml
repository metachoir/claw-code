name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 기준 오전 9시(UTC 00:00)에 실행
  workflow_dispatch: # 직접 버튼을 눌러 수동 실행도 가능하게 설정

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main # 본인 저장소의 브랜치명 (확인 필요)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream changes
        id: sync
        uses: a2021lv/upstream-sync@v2.0
        with:
          upstream_repository: code-yeongyu/oh-my-openagent
          upstream_branch: main # 원본 저장소의 브랜치명
          target_branch: main   # 본인 저장소의 브랜치명
          force: false          # 내 작업물이 사라지는 것을 방지

      - name: Check for errors
        if: steps.sync.outputs.has_new_commits == 'false'
        run: echo "새로운 업데이트가 없습니다."
